<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>واصف ديزاين | مصمم جرافيك</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
    * {margin:0; padding:0; box-sizing:border-box}
  body {
  font-family:'Cairo', sans-serif;
  background: linear-gradient(-45deg, #0D1117, #161B22, #1a1f2e, #0D1117);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  padding:20px;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%}
  50% {background-position: 100% 50%}
  100% {background-position: 0% 50%}
}
  .card {
    background:#161B22;
    padding:40px 30px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    max-width:450px;
    width:100%;
    border:1px solid #30363D;
  }
  .profile-img {
    width:140px;
    height:140px;
    border-radius:50%;
    border:4px solid #FFD700;
    object-fit:cover;
    margin-bottom:20px;
    transition:all 0.4s ease;
    box-shadow:0 0 20px rgba(255,215,0,0.3);
  }
  .profile-img:hover {
    transform:scale(1.08) rotate(3deg);
    box-shadow:0 0 35px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4);
    border-color:#FFEA00;
  }
  h1 {font-size:2.2rem; color:#FFD700; margin-bottom:8px}
  p {font-size:1.1rem; color:#c9d1d9; margin-bottom:30px}
  .links {display:flex; flex-direction:column; gap:15px}
  .btn {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:15px;
    border-radius:12px;
    text-decoration:none;
    color:#fff;
    font-weight:700;
    font-size:1.1rem;
    transition:all 0.2s ease;
    position:relative;
    overflow:hidden;
  }
  .btn:hover {transform:translateY(-4px); box-shadow:0 8px 20px rgba(0,0,0,0.4)}
  .btn:active {
    transform:scale(0.95) translateY(-2px);
    box-shadow:0 0 25px rgba(255,215,0,0.6);
  }
  .btn:active::after {
    content:'';
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background:radial-gradient(circle, rgba(255,215,0,0.4) 0%, transparent 70%);
    animation:flash 0.4s ease-out;
  }
  @keyframes flash {
    0% {opacity:1; transform:scale(0)}
    100% {opacity:0; transform:scale(2)}
  }
  .btn i {font-size:1.4rem}
  .whatsapp {background:#25D366}
  .facebook {background:#1877F2}
  .instagram {background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
  .tiktok {background:#000}
</style>
</head>
<body>
  <div class="card">
    <img src="profile.jpg" alt="واصف ديزاين" class="profile-img">
    <h1>واصف ديزاين</h1>
    <p>مصمم جرافيك | تصميم شعارات وهوية بصرية</p>
    <div class="links">
      <a href="https://wa.me/249114888713" class="btn whatsapp" target="_blank">
        <i class="fab fa-whatsapp"></i> تواصل واتساب
      </a>
      <a href="https://www.facebook.com/wasif.mohammed.2025?mibextid=rS40aB7S9Ucbxw6v" class="btn facebook" target="_blank">
        <i class="fab fa-facebook"></i> صفحتي على فيسبوك
      </a>
      <a href="https://www.instagram.com/wsf2851?igsh=OXdvcTc3Zjk2MWU2" class="btn instagram" target="_blank">
        <i class="fab fa-instagram"></i> تابعني على انستقرام
      </a>
      <a href="https://www.tiktok.com/@user3535567867504?_r=1&_t=ZS-964pGn2HmYW" class="btn tiktok" target="_blank">
        <i class="fab fa-tiktok"></i> تابعني على تيك توك
      </a>
    </div>
  </div>
</body>
</html>
